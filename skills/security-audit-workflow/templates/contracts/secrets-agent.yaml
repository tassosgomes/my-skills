# Contrato: Secrets Agent
# Sub-agent responsavel por detectar credenciais hardcoded ou commitadas
# Cobre OWASP: A02 (Cryptographic Failures), A05 (Security Misconfiguration)

agent_role: secrets-agent
case_id: "{{ CASE_ID }}"

scope:
  paths:
    - "{{ REPO_ROOT }}"
  scan_git_history: false           # true = scaneia todo o historico (lento)
  exclude:
    - "**/*.lock"
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/target/**"
    - "**/*.min.js"

context:
  related_owasp:
    - A02
    - A05
  notes: |
    Secrets em historico Git devem ser rotacionados imediatamente, mesmo que
    o commit tenha sido removido — assumir que ja foram comprometidos.

tooling:
  primary:
    tool_id: gitleaks               # rapido, regex-based, bom default
    config:
      report_format: sarif
      redact: true                  # nao expor secrets no relatorio
  alternatives:                     # caso usuario prefira
    - tool_id: trufflehog           # verifica se secret e valido (active validation)
    - tool_id: detect-secrets       # baseline-driven, util para repos grandes

execution:
  via: docker
  command: |
    python tools/run.py gitleaks detect \
      --source={{ REPO_ROOT }} \
      --report-format=sarif \
      --report-path={{ OUTPUT_PATH }} \
      --redact

output:
  format: sarif
  path: ".security/findings/{{ CASE_ID }}.sarif"
  also_emit:
    format: markdown
    path: ".security/findings/{{ CASE_ID }}.md"
    include:
      - secret_type
      - file_path
      - line_number
      - commit_sha                  # se scan_git_history=true
      - blame_author                # opcional, util para triagem

success_criteria:
  exit_codes_acceptable: [0, 1]     # 1 = secrets encontrados
  schema_validation: sarif-2.1.0

failure_protocol:
  on_tool_missing:
    action: "NOT_EXECUTED, recomendar instalacao de Docker"
  on_no_git_repo:
    action: "fallback para scan filesystem (sem historico), avisar"
  on_timeout_seconds: 300

reporting:
  back_to_dispatcher:
    - status
    - secrets_found_count
    - secrets_by_type               # {aws_key: N, github_token: N, ...}
    - critical_paths_with_secrets
    - sarif_path
    - execution_time_ms

remediation_guidance:
  on_findings: |
    1. Rotacionar TODAS as credenciais expostas imediatamente
    2. Remover do historico via git filter-repo (nao git rebase)
    3. Mover para gerenciador de secrets (Vault, AWS Secrets Manager, etc)
    4. Adicionar pattern ao .gitignore + pre-commit hook (gitleaks-precommit)
